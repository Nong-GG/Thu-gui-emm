<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi Dung ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#fff5f7);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.envelope{
    position:relative;
    width:320px;
    height:220px;
    cursor:pointer;
}

.cover{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff8fab;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:28px;
    transition:0.8s;
    z-index:2;
}

.letter{
    position:absolute;
    width:90%;
    left:5%;
    top:15px;
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    opacity:0;
    transform:translateY(50px);
    transition:1s;
}

.open .cover{
    transform:translateY(-250px);
    opacity:0;
}

.open .letter{
    opacity:1;
    transform:translateY(0);
}

h1{
    text-align:center;
    color:#ff4d88;
    margin-bottom:15px;
}

p{
    line-height:1.8;
    color:#444;
    text-align:center;
}

.sign{
    margin-top:20px;
    text-align:right;
    color:#ff4d88;
    font-weight:bold;
}

.heart{
    position:absolute;
    color:#ff4d88;
    animation:float 5s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

.music{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    font-size:14px;
    color:#666;
}
</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">
    <div class="cover">
        💌 Nhấn để mở thư
    </div>

    <div class="letter">
        <h1>Gửi Dung ❤️</h1>

        <p>
            Cảm ơn em đã xuất hiện và đến bên anh.<br><br>

            Tuy chúng ta chưa quen nhau lâu nhưng tình cảm anh trao cho em là thật lòng.<br><br>

            Anh yêu em rất nhiều và anh mong rằng sẽ có thật nhiều kỷ niệm đẹp cùng em trong tương lai.
        </p>

        <div class="sign">
            Yêu em ❤️<br>
            Long
        </div>
    </div>
</div>

<div class="music">
🎵 Nhạc nền: Em luôn ở trong tâm trí anh
</div>

<script>
function openLetter(){
    document.querySelector('.envelope').classList.add('open');
}

setInterval(()=>{
    const heart=document.createElement('div');
    heart.className='heart';
    heart.innerHTML='❤️';
    heart.style.left=Math.random()*100+'vw';
    heart.style.fontSize=(20+Math.random()*20)+'px';

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
},400);
</script>

</body>
</html>
